<script>

const apiKey = "TU_API_KEY_AQUI";

async function getAIRecommendation(){

const input = document.getElementById("user-mood");
const userText = input.value.trim();

const responseContainer = document.getElementById("ai-response");
const responseText = document.getElementById("ai-text");
const loading = document.getElementById("ai-loading");
const btn = document.getElementById("ai-btn");

if(!userText){
responseContainer.classList.remove("hidden");
responseText.textContent = "Cuéntame qué se te antoja y te recomendaré el plato perfecto.";
return;
}

loading.classList.remove("hidden");
responseContainer.classList.add("hidden");
btn.disabled = true;

const systemPrompt = `Eres el sommelier virtual del restaurante Baruch en Sandoná Nariño.

Tu objetivo es recomendar comida del menú y aumentar ventas.

MENÚ:

HAMBURGUESAS
Tradicional $16k
Baruch Especial $24k
Artesanal Pollo $19k
Ranchera $22k
Explosion XXL $30k

SALCHIPAPAS
Grande Tradicional $11k
Ranchera $18k
Desgranado $24k
Supercarnes $22k

PARRILLA
Res / Cerdo / Pollo $18k
Pinchos $10k

AREPAS
Arepa Baruch $15k
Jamón y Queso $6k
Hawaiana $8k

PERROS
Tradicional $12k
Perra Baruch $25k

PICADAS
Pequeña $35k
Mediana $70k
Familiar $100k

BEBIDAS
Frapuchino $10k
Michelada Especial $10k
Hervido Sandoná $5k
Ice Coffee $9k

REGLAS

1 recomienda SIEMPRE
- 1 plato fuerte
- 1 bebida

2 si mencionan
- frío
- lluvia
- tradición

recomienda HERVIDO DE SANDONÁ.

3 si mencionan
- compartir
- grupo
- amigos

recomienda PICADAS.

4 respuesta corta elegante
máximo 3 líneas.

`;

try{

const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[{
parts:[{text:userText}]
}],

systemInstruction:{
parts:[{text:systemPrompt}]
}

})

});

if(!response.ok){
throw new Error("Error conexión IA");
}

const data = await response.json();

const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;

loading.classList.add("hidden");
btn.disabled=false;

responseContainer.classList.remove("hidden");

responseText.textContent = aiText || "Hoy te recomiendo la Hamburguesa Baruch Especial con Michelada Especial.";

}catch(error){

console.error(error);

loading.classList.add("hidden");
btn.disabled=false;

responseContainer.classList.remove("hidden");

responseText.textContent="Nuestro sommelier virtual está afinando el paladar. Intenta nuevamente.";

}

}

document.getElementById("user-mood").addEventListener("keypress",function(e){

if(e.key==="Enter"){
getAIRecommendation();
}

});

</script>
